name: Update YML Feed Dates
on:
  schedule:
    - cron: '1 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Calculate next start dates
        id: dates
        run: |
          next_5() {
            today=$(date +%d)
            month=$(date +%m)
            year=$(date +%Y)
            if [ "$today" -le 5 ]; then
              echo "$year-$month-05"
            else
              next_month=$(date -d "$year-$month-01 +1 month" +%m)
              next_year=$(date -d "$year-$month-01 +1 month" +%Y)
              echo "$next_year-$next_month-05"
            fi
          }
          NEXT_5=$(next_5)
          echo "next_5=$NEXT_5" >> $GITHUB_OUTPUT

      - name: Replace placeholders in XML
        run: |
          echo "Содержимое файла до замены (строка с Ближайшая дата):"
          grep -n "Ближайшая дата" manmanlai.xml || echo "Строка не найдена"
    
          sed -i "s/\[NEXT_START_5\]/2026-04-05/g" manmanlai.xml
      
          echo "Содержимое файла после замены:"
          grep -n "Ближайшая дата" manmanlai.xml || echo "Строка не найдена"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add manmanlai.xml
          git diff --quiet && exit 0
          git commit -m "Auto-update start dates"
          git push
